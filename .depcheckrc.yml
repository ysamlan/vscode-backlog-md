# Depcheck config. Entries below are justified false positives — the package
# IS used, but depcheck can't see the usage because of how it's imported (not
# because we invoke it via bunx; tools in devDependencies are called directly
# by their bin name so depcheck can resolve them). If you're cleaning this
# list up, verify the package is still not directly imported anywhere before
# removing.

ignores:
  # Dynamic `import('tiny-markdown-editor')` in a .svelte file. Depcheck has no
  # Svelte parser, so the import is invisible to it.
  - tiny-markdown-editor

  # Peer dependency of @tailwindcss/cli (Tailwind v4 splits the CLI into its
  # own package). Used at CSS-compile time by the `tailwindcss` binary; not
  # directly imported by our source.
  - tailwindcss

  # Used by scripts/generate-licenses.sh via the `generate-license-file` bin.
  # Depcheck finds bin usages in package.json "scripts" entries but not in
  # standalone shell scripts, so this stays ignored.
  - generate-license-file

  # Consumed by scripts/screenshots/generate.ts for PNG optimization. The
  # import sometimes resolves via a binary path lookup that depcheck misses.
  - oxipng-bin

  # `vscode` is the VS Code extension runtime module, provided by the host at
  # load time. It is never an npm dependency. Types come from @types/vscode.
  # Depcheck flags the `import * as vscode from 'vscode'` in src/extension.ts
  # as a missing dependency; this ignore silences that false positive.
  - vscode

ignorePatterns:
  - dist
  - out
  - tmp
  - .vscode-test
