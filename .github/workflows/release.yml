# GitHub Actions should be updated using actions-up so we can use a cooldown
# and lock to deterministic versions (exception: security updates, which Dependabot
# will try to pull in):
#
# bun run update:actions

name: Release

on:
  release:
    types: [published]

jobs:
  build-vsix:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Update changelog from GitHub releases
        uses: rhysd/changelog-from-release/action@78b335bb7d059f35ad04c5428d50711726feee50 # v3.9.1
        with:
          file: CHANGELOG.md
          github_token: ${{ github.token }}
          commit: false
          push: false
          header: |
            # Changelog

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check engine version compatibility
        run: bun run check:engines

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify licenses are up to date
        run: |
          bun run licenses:generate
          git diff --exit-code ThirdPartyNotices.txt

      - name: Package .vsix
        run: bun run package

      - name: Upload .vsix to release
        run: gh release upload "${{ github.event.release.tag_name }}" *.vsix
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to VS Code Marketplace
        run: bunx "@vscode/vsce@3.9.1" publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: bunx "ovsx@0.10.11" publish *.vsix -p ${{ secrets.OVSX_PAT }}

      - name: Push version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No version or changelog changes to commit"
            exit 0
          fi
          git commit -m "Bump version to ${GITHUB_REF_NAME#v} and update changelog"
          git push origin HEAD:main
