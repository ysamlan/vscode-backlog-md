# GitHub Actions should be updated using actions-up so we can use a cooldown
# and lock to deterministic versions (exception: security updates, which Dependabot
# will try to pull in):
#
# bun run update:actions
#
# Release flow:
# 1. Locally, on a clean `main`: `bun run release` (invokes release-it).
#    It bumps package.json, promotes the CHANGELOG's [Unreleased] section to
#    a new version section, commits "Release vX.Y.Z", tags vX.Y.Z, and pushes.
# 2. The push of tag vX.Y.Z triggers this workflow, which builds the .vsix,
#    creates the GitHub release with the .vsix attached, and publishes to
#    the VS Code Marketplace and Open VSX.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-vsix:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check engine version compatibility
        run: bun run check:engines

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify licenses are up to date
        run: bun run licenses:check

      - name: Package .vsix
        run: bun run package

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Capture lines between `## [VERSION]` and the next version boundary.
          # Version boundaries are: next `## [...]` heading, next `# ` heading
          # (legacy rhysd-style entries), the migration comment, or a legacy
          # `<a id="..."></a>` anchor.
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ "^## \\[" ver "\\]") { in_section=1; next }
            }
            /^# / { if (in_section) exit }
            /^<a id=/ { if (in_section) exit }
            /^<!-- Entries below/ { if (in_section) exit }
            in_section { print }
          ' CHANGELOG.md | awk 'NF { blank=0; print; next } { blank++; if (blank==1) print }' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG section found for version $VERSION"
            exit 1
          fi
          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Create GitHub release with .vsix attached
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            *.vsix
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to VS Code Marketplace
        run: bunx "@vscode/vsce@3.9.1" publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: bunx "ovsx@0.10.11" publish *.vsix -p ${{ secrets.OVSX_PAT }}
